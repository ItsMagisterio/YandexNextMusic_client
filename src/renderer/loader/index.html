<!doctype html>
<html lang="en">
        <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>Preload</title>
        </head>

        <body>
                <div class="loader_wrap" id="spinner_view">
                        <div class="next_icon"></div>
                        <div class="made_by">made by magister1o</div>
                        <div class="loading_spinner"></div>
                </div>

                <div class="update_wrap" id="update_view" hidden>
                        <div class="update_top">
                                <div class="update_icon"></div>
                                <div class="update_title" id="update_title"></div>
                                <div class="update_version" id="update_version"></div>
                        </div>

                        <div class="update_bottom">
                                <div class="update_actions" id="update_actions">
                                        <button class="update_btn update_btn--primary" id="update_confirm">
                                                Update
                                        </button>
                                        <button class="update_btn update_btn--ghost" id="update_cancel">
                                                Cancel
                                        </button>
                                </div>

                                <div class="update_status" id="update_status" hidden></div>
                                <div class="update_progress" id="update_progress" hidden>
                                        <div class="update_progress_bar" id="update_progress_bar"></div>
                                </div>
                        </div>
                </div>
        </body>

        <script type="module" src="./script.js"></script>
</html>
