<!doctype html>
<html lang="en">
        <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>Yandex Next: Settings</title>
                <script>
                        (function () {
                                var root = document.documentElement;
                                var m =
                                        window.matchMedia &&
                                        window.matchMedia("(prefers-color-scheme: light)");
                                function apply() {
                                        var light = !!(m && m.matches);
                                        root.classList.toggle("mdui-theme-light", light);
                                        root.classList.toggle("mdui-theme-dark", !light);
                                }
                                apply();
                                if (m && m.addEventListener) m.addEventListener("change", apply);
                        })();
                </script>
        </head>
        <body>
                <div class="titlebar">
                        <div class="tb-titlegroup">
                                <div class="tb-icon" aria-hidden="true"></div>
                                <span class="tb-title" data-i18n="settings.title">Settings</span>
                        </div>
                        <button
                                class="tb-btn tb-minimize"
                                onclick="window.electronAPI?.minimizeWindow()"
                        >
                                <svg
                                        width="10"
                                        height="1"
                                        viewBox="0 0 10 1"
                                        fill="none"
                                        xmlns="http://www.w3.org/2000/svg"
                                >
                                        <path d="M0 0.5H10" stroke="currentColor" stroke-width="1" />
                                </svg>
                        </button>
                        <button
                                class="tb-btn tb-maximize"
                                id="tb-maximize"
                                onclick="toggleMaximize()"
                        >
                                <svg
                                        width="10"
                                        height="10"
                                        viewBox="0 0 10 10"
                                        fill="none"
                                        xmlns="http://www.w3.org/2000/svg"
                                >
                                        <rect
                                                x="0.5"
                                                y="0.5"
                                                width="9"
                                                height="9"
                                                rx="0.5"
                                                stroke="currentColor"
                                                stroke-width="1"
                                        />
                                </svg>
                        </button>
                        <button
                                class="tb-btn tb-close"
                                onclick="window.electronAPI?.closeWindow()"
                        >
                                <svg
                                        width="10"
                                        height="10"
                                        viewBox="0 0 10 10"
                                        fill="none"
                                        xmlns="http://www.w3.org/2000/svg"
                                >
                                        <path
                                                d="M0.5 0.5L9.5 9.5M9.5 0.5L0.5 9.5"
                                                stroke="currentColor"
                                                stroke-width="1"
                                                stroke-linecap="round"
                                        />
                                </svg>
                        </button>
                </div>

                <div class="layout">
                        <nav class="sidebar" id="sidebar">
                                <div class="sidebar-nav" id="sidebar-nav">
                                        <div class="skel-nav">
                                                <div class="skel skel-nav-icon"></div>
                                                <div class="skel skel-nav-label"></div>
                                        </div>
                                        <div class="skel-nav">
                                                <div class="skel skel-nav-icon"></div>
                                                <div class="skel skel-nav-label"></div>
                                        </div>
                                        <div class="skel-nav">
                                                <div class="skel skel-nav-icon"></div>
                                                <div class="skel skel-nav-label"></div>
                                        </div>
                                        <div class="skel-nav">
                                                <div class="skel skel-nav-icon"></div>
                                                <div class="skel skel-nav-label"></div>
                                        </div>
                                        <div class="skel-nav">
                                                <div class="skel skel-nav-icon"></div>
                                                <div class="skel skel-nav-label"></div>
                                        </div>
                                </div>
                                <div class="sidebar-footer" id="sidebar-footer">
                                        <div class="ver-card">
                                                <div class="ver-row">
                                                        <span class="ver-name">Yandex Next</span>
                                                        <span class="ver-val" id="ver-app">-</span>
                                                </div>
                                                <div class="ver-row">
                                                        <span class="ver-name">Electron</span>
                                                        <span class="ver-val" id="ver-electron">-</span>
                                                </div>
                                                <div class="ver-row">
                                                        <span class="ver-name">Chromium</span>
                                                        <span class="ver-val" id="ver-chromium">-</span>
                                                </div>
                                                <div class="ver-row">
                                                        <span class="ver-name">Node.js</span>
                                                        <span class="ver-val" id="ver-node">-</span>
                                                </div>
                                        </div>
                                </div>
                        </nav>
                        <main class="content" id="content">
                                <div class="skel-panel" aria-hidden="true">
                                        <div class="skel-sec">
                                                <div class="skel skel-line skel-w35"></div>
                                                <div class="skel skel-switch"></div>
                                        </div>
                                        <div class="skel-rows">
                                                <div class="skel-row">
                                                        <div class="skel-row-text">
                                                                <div class="skel skel-line skel-w45"></div>
                                                                <div class="skel skel-line skel-sub skel-w70"></div>
                                                        </div>
                                                        <div class="skel skel-switch"></div>
                                                </div>
                                                <div class="skel-row">
                                                        <div class="skel-row-text">
                                                                <div class="skel skel-line skel-w55"></div>
                                                                <div class="skel skel-line skel-sub skel-w60"></div>
                                                        </div>
                                                        <div class="skel skel-field"></div>
                                                </div>
                                                <div class="skel-row">
                                                        <div class="skel-row-text">
                                                                <div class="skel skel-line skel-w40"></div>
                                                                <div class="skel skel-line skel-sub skel-w75"></div>
                                                        </div>
                                                        <div class="skel skel-switch"></div>
                                                </div>
                                                <div class="skel-row">
                                                        <div class="skel-row-text">
                                                                <div class="skel skel-line skel-w50"></div>
                                                                <div class="skel skel-line skel-sub skel-w65"></div>
                                                        </div>
                                                        <div class="skel skel-field"></div>
                                                </div>
                                        </div>
                                </div>
                        </main>
                </div>

                <script type="module" src="./script.js"></script>
        </body>
</html>
